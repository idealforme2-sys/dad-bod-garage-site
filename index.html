<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Dad Bod Garage in Coolidge, AZ provides diagnostics-first auto repair for daily drivers, fleets, RVs, school buses, classics, and muscle cars.">
    <meta name="theme-color" content="#0b0f19">
    <meta property="og:title" content="Dad Bod Garage | Diagnostics-First Auto Repair">
    <meta property="og:description" content="Honest, no-BS auto diagnostics and repair in Coolidge, AZ.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b0f19'/%3E%3Cpath d='M14 39h36l-4-12H18l-4 12Z' fill='%23f5b301'/%3E%3Ccircle cx='22' cy='42' r='5' fill='%23f8fafc'/%3E%3Ccircle cx='42' cy='42' r='5' fill='%23f8fafc'/%3E%3Cpath d='M22 24h20l3 6H19l3-6Z' fill='%23d97706'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/src/styles.css">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "AutoRepair",
        "name": "Dad Bod Garage",
        "telephone": "+1-520-752-0453",
        "email": "DadBodGarageAZ@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "980 S Arizona Boulevard Suite B-1",
          "addressLocality": "Coolidge",
          "addressRegion": "AZ",
          "postalCode": "85128",
          "addressCountry": "US"
        },
        "openingHoursSpecification": [
          { "@type": "OpeningHoursSpecification", "dayOfWeek": ["Monday", "Tuesday", "Thursday", "Friday"], "opens": "08:00", "closes": "16:00" },
          { "@type": "OpeningHoursSpecification", "dayOfWeek": "Saturday", "opens": "10:00", "closes": "15:00" }
        ]
      }
    </script>
    <title>Dad Bod Garage | Diagnostics-First Auto Repair</title>
  </head>
  <body>
    <a class="skip-link" href="#app">Skip to content</a>

    <div id="cursor-dot" aria-hidden="true"></div>
    <div id="cursor-ring" aria-hidden="true"></div>

    <div id="preloader" class="preloader" aria-live="polite">
      <img src="/DadBodLogo.png" alt="Dad Bod Garage" class="loader-logo">
      <div class="counter-wrap">
        <span class="counter" id="counter" data-loader-count>0</span>%
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loader-text" data-loader-text>Initializing...</p>
    </div>

    <div id="transition-wrapper" class="page-transition" aria-hidden="true">
      <div class="transition-text">Re-calibrating Diagnostics...</div>
      <div class="transition-subtext">System Link Active</div>
    </div>

    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script>
      // Fallback if GSAP fails to load (Brave Shields etc)
      if (typeof gsap === 'undefined') {
        console.warn('GSAP failed to load. Falling back to CSS transitions.');
        document.documentElement.classList.add('no-gsap');
      }
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
